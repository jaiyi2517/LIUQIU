<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小琉球旅遊手冊</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#74B3CE',    /* 主藍色 */
                            lightBlue: '#A2D5F2',/* 淺藍色 */
                            cream: '#F2E5C2',    /* 米黃色 */
                            yellow: '#F6C667',   /* 亮黃色 (強調) */
                            mint: '#BEE1C3',     /* 薄荷綠 */
                            bg: '#F8F9FA',       /* 背景白 */
                            text: '#BCAAA4',     /* 可可色/次要文字 */
                            dark: '#5D4037'      /* 深棕色/主要文字，確保對比度 */
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8F9FA;
            color: #5D4037;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏滾動條但保持可滾動 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .tab-active {
            background-color: #74B3CE;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(116, 179, 206, 0.39);
            transform: scale(1.05);
            font-weight: 700;
        }

        .tab-inactive {
            background-color: white;
            color: #BCAAA4;
            border: 1px solid #e2e8f0;
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .header-bg {
            background: linear-gradient(135deg, #74B3CE 0%, #A2D5F2 100%);
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="header-bg relative pt-12 pb-22 px-6 overflow-hidden shadow-soft">
        <div class="absolute top-0 left-0 w-full h-full opacity-10">
            <!-- 裝飾性背景圖案 -->
            <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M141.5 292C80.3 292 28 244.7 28 183.5C28 122.3 80.3 75 141.5 75C202.7 75 255 122.3 255 183.5C255 244.7 202.7 292 141.5 292Z" stroke="white" stroke-width="40"/>
                <path d="M366.5 141.5C366.5 202.7 319.2 255 258 255C196.8 255 149.5 202.7 149.5 141.5C149.5 80.3 196.8 33 258 33C319.2 33 366.5 80.3 366.5 141.5Z" stroke="white" stroke-width="40"/>
            </svg>
        </div>
        <div class="relative z-6 max-w-2xl mx-auto text-center">
            <h1 class="text-3xl md:text-4xl font-black text-white tracking-wider mb-3 drop-shadow-md">小琉球之旅</h1>
            <p class="text-brand-bg opacity-90 text-sm md:text-base font-medium">7/31 (五) - 8/2 (日)</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 -mt-12 relative z-20 pb-20">
        
<!-- Tabs -->
<div class="flex justify-center gap-2 md:gap-6 items-center bg-white/80 backdrop-blur-md p-2 rounded-2xl shadow-soft mb-8">
    
    <!-- 4. 若不想讓按鈕填滿寬度，可以考慮拿掉 flex-1 改用 w-24 (固定寬度) 或直接讓它自然縮小 -->
    <button onclick="switchTab(0)" id="tab-0" class="px-4 py-2 rounded-xl text-center transition-all duration-300 tab-active">
        <div class="text-xs font-bold mb-1 opacity-80">Day 1</div>
        <div class="text-sm">7/31 (五)</div>
    </button>

    <button onclick="switchTab(1)" id="tab-1" class="px-3 py-2 rounded-xl text-center transition-all duration-300 tab-inactive">
        <div class="text-xs font-bold mb-1 opacity-80">Day 2</div>
        <div class="text-sm">8/1 (六)</div>
    </button>

    <button onclick="switchTab(2)" id="tab-2" class="px-3 py-2 rounded-xl text-center transition-all duration-300 tab-inactive">
        <div class="text-xs font-bold mb-1 opacity-80">Day 3</div>
        <div class="text-sm">8/2 (日)</div>
    </button>
</div>

        <!-- 行程內容容器 -->
        <div id="timeline-container" class="fade-enter-active bg-transparent px-0">
            <!-- 內容由 JS 動態生成 -->
        </div>

    </main>

    <script>
        const itineraryData = [
            // ================= DAY 1 =================
            [
                { time: "11:30", title: "中正集合,前往嘉義火車站", icon: "fa-solid fa-user-group" },
                { time: "12:10", title: "集合後出發至東港", icon: "fa-solid fa-car-side" },
                { time: "14:15", title: "抵達東琉停車場", icon: "fa-solid fa-square-parking", link: "https://share.google/7LywYJPNQRpOaKbKf" },
                { time: "14:20", title: "搭乘接駁車至碼頭", icon: "fa-solid fa-bus" },
                { time: "14:30", title: "兌換藍白航運船票&候位", icon: "fa-solid fa-ticket" },
                { time: "15:20", title: "搭船", icon: "fa-solid fa-ferry", highlight: true },
                { time: "15:45", title: "抵達小琉球", icon: "fa-solid fa-anchor" },
                { time: "16:00", title: "前往城隍廟取車-999機車", icon: "fa-solid fa-motorcycle", link: "https://share.google/xDTkkJJl4e3Y9zLtS" },
                { time: "16:15", title: "白燈樓旅宿check-in", icon: "fa-solid fa-house", link: "https://maps.app.goo.gl/RkZeFgsYVj5iT9RF9" },
                { time: "16:45", title: "小山看海藝文園區", icon: "fa-solid fa-camera", link: "https://share.google/EiY5U80DVSXdujULs", colorType: "mint" },
                { time: "18:30", title: "【晚餐】-漁人酒肆", icon: "fa-solid fa-utensils", link: "https://share.google/OauLkcGonKsCTLp8u", colorType: "yellow" },
                { time: "20:00", title: "微醺之夜(回民宿or 酒吧)", desc: "待選:Sea Daze/酒窩 Bar Cave", icon: "fa-solid fa-wine-glass", colorType: "brand" }
            ],
            // ================= DAY 2 =================
            [
                { time: "10:15", title: "【早餐】", desc: "洪媽媽早餐店/小琉球脆皮蛋餅/阿娟早餐店", icon: "fa-solid fa-mug-hot", colorType: "yellow" },
                { time: "10:40", title: "小琉球海生館", icon: "fa-solid fa-fish", colorType: "mint" ,link: "https://maps.app.goo.gl/sT2DPPNWBBHe2F3x6" },
                { time: "11:45", title: "【午餐】-蔡阿伯麵店", icon: "fa-solid fa-bowl-food", link: "https://share.google/7rXldrqVqDY46joxs", colorType: "yellow" },
                { time: "14:30", title: "蛤板灣威尼斯沙灘+烏鬼洞", icon: "fa-solid fa-water", colorType: "mint"  ,link: "https://maps.app.goo.gl/bF2sgKZT5CmK17oSA"},
                { time: "16:30", title: "【下午茶】-小本愛玉", desc: "人太多的話可以改去【烏鬼洞雪花冰】", icon: "fa-solid fa-ice-cream", link: "https://share.google/OA6bBRNh5lXwyVgnO", colorType: "yellow" },
                { time: "17:30", title: "落日亭", icon: "fa-solid fa-sun", colorType: "mint",link: "https://maps.app.goo.gl/cLgpocxsYXXtnoxL7" },
                { time: "18:30", title: "【晚餐】-小琉球觀亭餐館", icon: "fa-solid fa-utensils", link: "https://share.google/TlhPBt88b5kjAJE0G", colorType: "yellow" },
                { time: "21:00", title: "【宵夜】", desc: "厝琉香鹽酥雞/廟口鹹酥雞", icon: "fa-solid fa-moon", colorType: "yellow" }
            ],
            // ================= DAY 3 =================
            [
                { time: "09:45", title: "退房&【早餐】", desc: "洪媽媽早餐店/小琉球脆皮蛋餅/阿娟早餐店", icon: "fa-solid fa-mug-hot", colorType: "yellow" },
                { time: "10:20", title: "拍照景點", desc: "觀音石、龍蝦洞、網美老木 (不固定路線,不一定要全去)", icon: "fa-solid fa-camera", colorType: "mint" },
                { time: "11:30", title: "【午餐】-梨小籠", icon: "fa-solid fa-shop", link: "https://maps.app.goo.gl/oNJpdgpKrVmYjm3A9", colorType: "yellow" },
                { time: "13:00", title: "買伴手禮、騎車亂晃", desc: "龍鑽麻花捲/寶哥麻花捲/卡布敦啤酒", icon: "fa-solid fa-gift" },
                { time: "13:20", title: "城隍廟 999 機車行還車", icon: "fa-solid fa-motorcycle" },
                { time: "13:30", title: "藍白航運排隊候位", icon: "fa-solid fa-ticket" },
                { time: "14:20", title: "搭船", icon: "fa-solid fa-ferry", highlight: true },
                { time: "14:45", title: "抵達東港", icon: "fa-solid fa-anchor" },
                { time: "15:00", title: "搭乘接駁車至停車場", icon: "fa-solid fa-bus" },
                { time: "15:10", title: "取車回程", icon: "fa-solid fa-car-side" }
            ]
        ];

        function getColorsByType(type, highlight) {
            if (highlight) return { iconText: 'text-[#74B3CE]', sideBar: 'bg-[#74B3CE]' };
            switch(type) {
                case 'yellow': return { iconText: 'text-[#d4a03c]', sideBar: 'bg-[#F6C667]' };
                case 'mint': return { iconText: 'text-[#5d8f63]', sideBar: 'bg-[#BEE1C3]' };
                case 'brand': return { iconText: 'text-[#74B3CE]', sideBar: 'bg-[#A2D5F2]' };
                default: return { iconText: 'text-[#BCAAA4]', sideBar: 'bg-gray-200' };
            }
        }

        function renderTimeline(dayIndex) {
            const container = document.getElementById('timeline-container');
            
            container.classList.remove('fade-enter-active');
            container.classList.add('fade-enter');

            setTimeout(() => {
                const dayData = itineraryData[dayIndex];
                let html = '<div class="space-y-0">'; 
                
                dayData.forEach((item, index) => {
                    const colors = getColorsByType(item.colorType, item.highlight);
                    const hasLink = !!item.link;
                    const isLast = index === dayData.length - 1;
                    
                    html += `
                    <div class="flex gap-2 md:gap-4 items-stretch group relative">
                        <!-- 左側時間 -->
                        <div class="w-14 md:w-16 pt-3.5 flex-shrink-0 text-right">
                            <span class="text-[15px] font-bold text-[#74B3CE] tracking-wide">${item.time}</span>
                        </div>
                        
                        <!-- 中間時間軸：小圓點與連線 -->
                        <div class="relative w-6 md:w-8 flex-shrink-0">
                            <!-- 垂直連線 -->
                            ${!isLast ? '<div class="absolute top-[28px] -bottom-[24px] left-1/2 -translate-x-1/2 w-[2px] bg-[#A2D5F2]/40"></div>' : ''}
                            <!-- 小圓點 -->
                            <div class="absolute top-[20px] left-1/2 -translate-x-1/2 w-[10px] h-[10px] rounded-full bg-[#74B3CE] z-10 shadow-[0_0_0_4px_rgba(116,179,206,0.15)] ${item.highlight ? 'bg-[#F6C667] shadow-[0_0_0_4px_rgba(246,198,103,0.2)]' : ''}"></div>
                        </div>
                        
                        <!-- 右側資訊卡片 -->
                        <div class="flex-1 pb-5">
                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 hover:shadow-md transition-all relative overflow-hidden">
                                <!-- 左側裝飾線條 -->
                                <div class="absolute left-0 top-0 bottom-0 w-1.5 ${colors.sideBar}"></div>
                                
                                <div class="flex items-start gap-3 pl-1">
                                    <!-- 完全移除背景圓圈，只保留乾淨的圖示 -->
                                    <div class="flex items-center justify-center flex-shrink-0 pt-0.5">
                                        <i class="${item.icon} text-xl ${colors.iconText}"></i>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h3 class="text-base font-bold text-[#5D4037] leading-snug">${item.title}</h3>
                                        ${item.desc ? `<p class="text-sm text-[#BCAAA4] mt-1.5 leading-relaxed">${item.desc}</p>` : ''}
                                        
                                        ${hasLink ? `
                                        <div class="mt-3">
                                            <a href="${item.link}" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[#F8F9FA] text-xs font-medium text-[#74B3CE] hover:bg-[#74B3CE] hover:text-white transition-colors border border-gray-100">
                                                <i class="fa-solid fa-location-dot text-sm"></i>
                                                查看地圖 / 資訊
                                            </a>
                                        </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
                
                container.classList.remove('fade-enter');
                container.classList.add('fade-enter-active');
            }, 300);
        }

        function switchTab(index) {
            for (let i = 0; i < 3; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (i === index) {
                    tab.classList.remove('tab-inactive');
                    tab.classList.add('tab-active');
                } else {
                    tab.classList.remove('tab-active');
                    tab.classList.add('tab-inactive');
                }
            }
            renderTimeline(index);
        }

        window.onload = () => {
            renderTimeline(0);
        };
    </script>
</body>
</html>
